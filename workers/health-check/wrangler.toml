name = "aiready-health-check"
main = "src/index.ts"
compatibility_date = "2024-01-01"

[triggers]
crons = ["*/5 * * * *"]  # Run every 5 minutes

# Optional: Cloudflare Pages for logging
# [[observability.logpush]]
# endpoint = "https://logs.example.com"
# dataset = "workers"

[vars]
# Environment variables for endpoints to monitor
ENDPOINTS = "[\"https://getaiready.dev\", \"https://platform.getaiready.dev\", \"https://clawmore.getaiready.dev\", \"https://superclaw.getaiready.dev\"]"

# Optional: Discord/Slack webhook for notifications
# WEBHOOK_URL = ""
